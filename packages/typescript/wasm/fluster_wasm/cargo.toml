[package]
edition.workspace = true
name = "fluster_wasm"
publish = false
version.workspace = true

[lib]
crate-type = ["cdylib"]

[lints]
workspace = true

[dependencies]
wasm-bindgen = "0.2.114"
fluster_core_utilities = { path = "../../../rust/fluster_core_utilities" }
fluster_pre_parser = { path = "../../../rust/fluster_pre_parser/" }

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--enable-bulk-memory"]
