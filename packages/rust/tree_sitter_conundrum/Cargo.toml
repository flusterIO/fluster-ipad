[package]
name = "tree-sitter-conundrum"
description = "A Rust powered superset of mdx."
version = "0.1.0"
authors = ["Andrew Mueller (fluster.eyeoh@gmail.com) <fluster.eyeoh@gmail.com>"]
license = "MIT"
readme = "README.md"
keywords = ["incremental", "parsing", "tree-sitter", "conundrum"]
categories = ["parser-implementations", "parsing", "text-editors"]
repository = "https://github.com/flusterio"
edition = "2021"
autoexamples = false

build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "grammar.js",
  "queries/*",
  "src/*",
  "tree-sitter.json",
  "/LICENSE",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.2"

[dev-dependencies]
tree-sitter = "0.26.7"
