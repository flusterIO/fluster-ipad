[package]
edition.workspace = true
name = "fluster_wasm"
publish = false
version.workspace = true

[lib]
crate-type = ["cdylib"]

[lints]
workspace = true

[dependencies]
wasm-bindgen = "0.2.114"
fluster_core_utilities = { path = "../../../rust/fluster_core_utilities" }
fluster_pre_parser = { path = "../../../rust/fluster_pre_parser/" }
serde-wasm-bindgen = "0.6.5"
web-sys = "0.3.91"
js-sys = "0.3.91"
gloo = "0.11.0"
wasm-bindgen-futures = "0.4.64"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--enable-bulk-memory"]
