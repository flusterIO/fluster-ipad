[package]
edition.workspace = true
name = "fluster_wasm"
publish = false
version.workspace = true

[lib]
crate-type = ["cdylib"]

[lints]
workspace = true

[dependencies]
wasm-bindgen = "0.2.114"
# fluster_core_utilities = { path = "../../../rust/fluster_core_utilities" }
conundrum_lsp = { path = "../../../rust/conundrum_lsp/" }
conundrum = { path = "../../conundrum/" }
serde-wasm-bindgen = "0.6.5"
web-sys = "0.3.91"
js-sys = "0.3.91"
gloo = "0.11.0"
wasm-bindgen-futures = "0.4.64"
wasm-react = "0.6.0"
rust_tikz = "0.1.0"
# wasm-bindgen-rayon = "1.3.0"
# rayon.workspace = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--enable-bulk-memory"]
