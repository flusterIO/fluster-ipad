[package]
edition.workspace = true
name = "conundrum_wasm"
publish = false
version.workspace = true

[lib]
crate-type = ["cdylib"]

[lints]
workspace = true

[dependencies]
wasm-bindgen = "0.2.114"
# fluster_core_utilities = { path = "../../../rust/fluster_core_utilities" }
# conundrum_lsp = { path = "../../../rust/conundrum_lsp/" }
conundrum = { path = "../../conundrum/", features = ["wasm"] }
serde-wasm-bindgen = "0.6.5"
web-sys = { version = "0.3.91", features = ["Document", "Element"] }
js-sys = "0.3.91"
gloo = "0.11.0"
wasm-bindgen-futures = "0.4.64"
rust_tikz = "0.1.0"
tsify = { version = "0.5.6", features = ["js"] }
wasm-bindgen-rayon = { version = "1.3.0", features = [ "no-bundler" ]}
rayon = "1.5"
getrandom = { version = "0.3.4", features = ["wasm_js"] }

[patch.crates-io]
prettytable-rs = { git = "https://github.com/phsym/prettytable-rs", branch = "master"}

[package.metadata.wasm-pack.profile.development]
wasm-opt = ["--all-features"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O4", "--all-features"]

# [target.'cfg(target_arch = "wasm32")']
# rustflags = ["-C", "target-feature=+atomics,+bulk-memory"]

# [package.metadata.wasm-pack.profile.release]
