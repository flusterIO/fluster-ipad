[package]
name = "fluster_pre_parser"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
uniffi = { workspace = true }
fluster_core_utilities = { workspace = true }
serde = { workspace = true }
async-trait = { workspace = true }
regex = { workspace = true }
rayon = { workspace = true }
gray_matter = "0.3.2"
strum_macros = "0.27.2"
flatbuffers.workspace = true
chrono = { workspace = true }
rust-embed = { version = "8.11.0", features = ["compression", "debug-embed"] }
phf = { version = "0.13.1", features = ["macros"] }
strum = { version = "0.27.2", features = ["derive"] }
insta = "1.46.3"
fancy-regex = "0.17.0"
serde_json.workspace = true
wasm-bindgen = "0.2.114"
web-sys = "0.3.91"
js-sys = "0.3.91"
gloo = "0.11.0"
serde-wasm-bindgen = "0.6.5"
uuid = { version = "1.22.0", features = ["js"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.0", features = ["full"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = "0.4"

[profile.release]
lto = "fat"


[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports", "async_tokio"] }

[[bench]]
name = "parse_by_regex"
harness = false
