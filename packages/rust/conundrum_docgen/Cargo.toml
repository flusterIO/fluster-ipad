[package]
name = "conundrum_docgen"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
askama = "0.15.6"
clap = { version = "4.6.1", features = ["derive"] }
conundrum = {path = "../conundrum/", features = ["docgen"]}
conundrum_config = {path = "../conundrum_config/"}
conundrum_cli = {path = "../conundrum_cli/"}
schemars = "1.2.1"
strum.workspace = true
strum_macros.workspace = true
tabled = "0.20.0"
tokio = { version = "1.52.1", features = ["full"] }
rustdoc-types = "0.57.3"
rustdoc-json = "0.9.10"
glob = "0.3.3"
serde_json.workspace = true
serde.workspace = true
thiserror.workspace = true
palette = { version = "0.7.6", features = ["serializing", "random"] }
css-color = "0.2.8"
cssparser = "0.36.0"

[lints]
workspace = true
