<div class="w-full flex flex-col justify-center items-center gap-0">
    <div style="padding-left: {{self.padding_left()}}rem;"
cdrm-heading-id="{{self.item.id | safe}}"
        class="cdrm-toc-item w-full grid grid-cols-[2rem_1fr] px-2 text-fd-card-foreground/80 hover:text-fd-card-foreground transition-colors duration-300">
        <div class="place-self-center h-full font-lucide">
            {{lucide_icons::Icon::ChevronRight.unicode().to_string() | safe}}
        </div>
        <div 
            class="w-full z-1 opacity-80 hover:opacity-100 transition-opacity duration-300 cursor-pointer [&_svg]:h-3 [&_svg]:w-auto">
            {{self.item.content | safe}}
        </div>
    </div>
    <div class="w-full overflow-x-hidden overflow-y-auto" style="padding-left: {{self.padding_left() + 1.0}}rem;">
        {% for item in self.nested %}
        {{item.render()? | safe}}
        {% endfor %}
    </div>
</div>
