<div class="w-full h-fit max-w-[min(1080px,100%,90vw)] mx-auto bg-fd-card rounded-border px-4 py-3 rounded-lg border">
    <div class="w-full text-lg font-bold">
        Table of Contents
    </div>
    <div class="w-full">
        {% for heading in self.get_items() %}
        {%- match heading -%}
            {%- when TocItemVariant::NoNested(n) -%}
            {{n.render()? | safe}}
            {%- when TocItemVariant::WithNested(n) -%}
            {{n.render()? | safe}}
        {%- endmatch -%}
        {% endfor %}
    </div>
</div>
