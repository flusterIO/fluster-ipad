[package]
name = "conundrum"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true


[features]
## This is still a work in progress, as Fluster does not use wasm for parsing directly and instead routes the parsing through Swift.
wasm = []
## This is mostly used for documentation generation, but might be useful in some edge use cases.
component_configs = []

[dependencies]
crossbeam = { version = "0.8.4", features = ["crossbeam-channel"] }
miette = { version = "7.6.0", features = ["fancy"] }
serde = { workspace = true, features = ["alloc", "rc"] }
serde_json.workspace = true
typeshare.workspace = true
strum = { workspace = true, features = ["derive"] }
strum_macros.workspace = true
gray_matter = "0.3.2"
flatbuffers.workspace = true
rust-embed = { version = "8.11.0", features = ["debug-embed"] }
dashmap = { version = "6.1.0", features = ["rayon", "serde"] }
lsp-types = "0.97.0"
typst = "0.14.2"
winnow = { workspace = true, features = [ "unstable-doc" ] }
num-format = "0.4.4"
github-slugger = "0.1.0"
googletest = "0.14.2"
rayon.workspace = true
thiserror.workspace = true
once_cell = "1.21.4"
regex.workspace = true
lazy_static = "1.5.0"
anyhow = "1.0.102"
cli-table = "0.5.0"
twemoji-assets = "1.5.1"
unicode-segmentation = "1.13.2"
qrcode = "0.14.1"
tabled = "0.20.0"
maud = "0.27.0"
askama = { version = "0.15.6", features = ["code-in-doc", "serde_json"] }
shlex = "1.3.0"
askama_derive = "0.15.6"
lexopt = "0.3.2"
typst-as-lib = { version = "0.15.4", features = ["typst-kit-fonts", "typst-kit-embed-fonts", "typst-html"] }
emoji = "0.2.1"
wasm-bindgen = { version = "0.2.114", features = ["serde", "serde-serialize", "serde_json"] }
serde-wasm-bindgen = "0.6.5"
css-color = "0.2.8"
tsify = { version = "0.5.6", features = ["js"] }
parking_lot = { version = "0.12.5", features = ["serde", "arc_lock", "owning_ref", "deadlock_detection"] }
derive_more = { version = "2.1.1", features = ["deref", "deref_mut", "from", "from_str", "is_variant", "testing-helpers"] }
bytemuck = { version = "1.25.0", features = ["derive"] }
derive_typst_intoval = "0.6.0"
typst-html = "0.14.2"
fuzzy-matcher = "0.3.7"
rust-fuzzy-search = "0.1.1"
tw_merge = { version = "0.1.21", features = ["variant"] }
serde_with = { version = "3.18.0", features = ["base64", "chrono", "json"] }
devicons = "0.6.12"
lucide-icons = { version = "1.8.0", features = ["serde"] }
yewdux = "0.13.0"
katex-rs = "0.2.4"
askama-enum = { version = "0.0.2", features = ["docsrs"]}
askama-markdown-cmark = "0.4.0"
wildmatch = { version = "2.6.1", features = ["serde"] }
base64 = "0.22.1"
scraper = { version = "0.26.0", features = ["deterministic", "serde"] }
schemars = { version = "1.2.1", features = ["either1"] }
textwrap = { version = "0.16.2", features = ["hyphenation"] }
text_trees = "0.1.2"
colorous = "1.0.16"
euclid = { version = "0.22.14", features = ["serde", "arbitrary"] }
arbitrary = { version = "1.4.2", features = ["derive"] }
itoa = "1.0.18"
dtoa = "1.0.11"
nshare = "0.10.0"
itertools = "0.14.0"
konst = "0.4.3"
humantime = "2.3.0"
icu = { version = "2.2.0", features = ["serde", "logging", "datagen", "compiled_data"] }
uniffi = { workspace = true }
mmdflux = "2.5.0"
memchr = "2.8.1"
indoc = "2.0.7"
unicode-case-mapping = "1.0.0"
smallvec = { version = "1.15.1", features = ["arbitrary", "serde", "const_new", "const_generics"] }
lexical-parse-float = "1.0.6"
zeroize = "1.8.2"
zeroize_derive = "1.4.3"
lexical-parse-integer = "1.0.6"
log = { version = "0.4.29", features = ["serde"] }
num-traits = "0.2.19"
ndarray = { version = "0.17.2", features = ["serde", "approx", "rayon"] }
palette = { version = "0.7.6", features = ["serde", "rand", "serializing", "random"] }
dashu = { version = "0.4.2", features = ["num-traits", "rand", "serde", "zeroize"] }
num-bigint = { version = "0.4.6", features = ["arbitrary", "quickcheck", "rand", "serde"] }
rust_decimal = { version = "1.42.0", features = ["maths-nopanic", "rand", "serde-with-arbitrary-precision", "ndarray"] }
conundrum_macros = { path = "../conundrum_macros/" }
syntect-assets = { version = "0.23.6", default-features=false, features = ["regex-fancy"] }
syntect = { version = "5.3.0", default-features = false, features = ["default-fancy"] }


[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
uniffi = { workspace = true }
tokio = { version = "1.0", features = ["full"] }
rssn = { version = "0.2.7", features = ["full"] }
ratatui = "0.30.0"
katex-rs = { version = "0.2.4", features = ["backtrace"]}
polars-lazy = "0.53.0"
rand = "0.10.1"
polars = { workspace = true }
text-splitter = { version = "0.30.1", features = ["markdown", "code"] }
lightningcss = { version = "1.0.0-alpha.71", features = ["serde", "serde_json", "substitute_variables"] }
tower-lsp = "0.20.0"
tui-math = "0.1.1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
uniffi = { workspace = true, features = ["wasm-unstable-single-threaded"] }
tokio = { version = "1.50.0", features = ["io-util", "macros", "rt", "sync"] }
katex-rs = {version = "0.2.4", features = ["wasm", "backtrace"]}
rust_decimal = { version = "1.42.0", features = ["maths-nopanic", "serde-with-arbitrary-precision", "wasm", "ndarray"] }
lightningcss = { version = "1.0.0-alpha.71", default-features=false, features = [] }
getrandom = { version = "0.3.4", features = ["wasm_js"] }


# [target.'cfg(debug_assertions)'.dependencies]
# winnow = { version = "0.7.15" }

# [target.'cfg(not(debug_assertions))'.dependencies]
# winnow = { version = "0.7.15", features = ["debug"] }


[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports", "async_tokio"] }
molc = "0.3.0"
insta = "1.46.3"
fluster_core_utilities = { path = "../fluster_core_utilities/" }
cargo-doc-md = "0.11.0"
rustdoc-md = "0.2.0"
burn = "0.21.0"
tower-test = "0.4.0"

[lints]
workspace = true


[[bench]]
name = "conundrum_full_parse"
harness = false


[[bench]]
name = "conundrum_get_title"
harness = false
