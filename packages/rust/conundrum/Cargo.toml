[package]
name = "conundrum"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
crossbeam = { version = "0.8.4", features = ["crossbeam-channel"] }
miette = { version = "7.6.0", features = ["fancy"] }
nom_locate.workspace = true
serde.workspace = true
serde_json.workspace = true
tower-lsp = "0.20.0"
typeshare.workspace = true
uniffi.workspace = true
fluster_core_utilities = { path = "../fluster_core_utilities/" }
insta = "1.46.3"
nom-supreme = "0.8.0"
strum = { workspace = true, features = ["derive"] }
strum_macros.workspace = true
gray_matter = "0.3.2"
flatbuffers.workspace = true
rust-embed = { version = "8.11.0", features = ["debug-embed"] }
dashmap = { version = "6.1.0", features = ["rayon"] }
tower-test = "0.4.0"
lsp-types = "0.97.0"
molc = "0.3.0"
typst = "0.14.2"
typst-library = "0.14.2"
typst-svg = "0.14.2"
typst-syntax = "0.14.2"
typst-pdf = "0.14.2"
typst-html = "0.14.2"
typst-render = "0.14.2"
typst-kit = { version = "0.14.2", features = ["embed-fonts"] }
rssn = { version = "0.2.7", features = ["full"] }
typst-eval = "0.14.2"
winnow = { version = "0.7.15" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.0", features = ["full"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
tokio = { version = "1.50.0", features = ["io-util", "macros", "rt", "sync"] }

# [target.'cfg(debug_assertions)']
# winnow = { version = "0.7.15" }

# [target.'cfg(not(debug_assertions))']
# winnow = { version = "0.7.15", features = ["debug"] }


[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports", "async_tokio"] }


[lints]
workspace = true


[[bench]]
name = "conundrum_full_parse"
harness = false
