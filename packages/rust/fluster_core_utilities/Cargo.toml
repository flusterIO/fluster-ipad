[package]
name = "fluster_core_utilities"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
thiserror = { workspace = true }
flatbuffers = { workspace = true }
serde.workspace = true
strum_macros.workspace = true
typeshare.workspace = true
chrono = { workspace = true }
glob = "0.3.3"
ignore = "0.4.25"
crossbeam = { version = "0.8.4", features = [
    "alloc",
    "std",
    "crossbeam-channel",
] }
crossbeam-channel = "0.5.15"
dirs = "6.0.0"
log = "0.4.29"
strum = { workspace = true, features = ["derive"] }
futures = "0.3.31"
filetime = "0.2.26"
gray_matter = "0.3.2"
ndarray = { version = "0.17.2", features = ["rayon"] }
rayon.workspace = true
regex.workspace = true
lazy_static = "1.5.0"
serde_json.workspace = true
wasm-bindgen = "0.2.114"
serde-wasm-bindgen = "0.6.5"
conundrum = { path = "../conundrum/" }
serde_qs = "1.1.1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
uniffi = { workspace = true }
uuid = { version = "1.19.0", features = ["v4"] }
tokio = { version = "1.0", features = ["full"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
uniffi = { workspace = true, features = [ "wasm-unstable-single-threaded" ] }
uuid = { version = "1.19.0", features = ["v4", "js"] }
tokio = { version = "1.50.0", features = ["io-util", "macros", "rt", "sync"] }


[profile.release]
lto = "fat"
