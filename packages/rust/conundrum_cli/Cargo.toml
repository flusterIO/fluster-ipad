[package]
name = "conundrum_cli"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "conundrum_cli"
path = "src/lib.rs"

[[bin]]
name = "cdrm"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
ratatui = { version = "0.30.0", features = ["all-widgets", "serde"] }
ratatui-textarea = "0.8.0"
reedline = "0.46.0"
reedline-repl-rs = { version = "1.3.0", features = ["async", "async_derive", "derive", "scripts", "shlex", "macro"] }
tokio = { version = "1.52.3", features = ["full"] }
tree-sitter-highlight = "0.26.8"
tui-big-text = "0.8.2"
tui-checkbox = "0.4.3"
tui-nodes = "0.10.0"
tui-piechart = "0.3.1"
tui-scrollview = "0.6.2"
conundrum = { path = "../conundrum/" }
anyhow = "1.0.102"
serde.workspace = true
thiserror.workspace = true
rayon.workspace = true
notify = "8.2.0"
serde_json.workspace = true
schemars = { version = "1.2.1", features = ["either1"] }
package_json_schema = "0.3.0"
tempfile = "3.27.0"
config = { version = "0.15.23", features = ["json"] }
figment = { version = "0.10.19", features = ["json", "toml", "yaml", "serde_json", "env", "parking_lot", "tempfile"] }
just = "1.51.0"
walkdir = "2.5.0"
ignore = "0.4.25"
conundrum_config = {path = "../conundrum_config/"}
prettycli = "0.1.1"
clap-cargo = { version = "0.18.3", features = ["cargo_metadata"] }
clap-verbosity = "2.1.0"
cargo_metadata = "0.23.1"
resolve-path = "0.1.0"
dirs = "6.0.0"
relative-path = "2.0.1"
path-absolutize = { version = "3.1.1", features = ["use_unix_paths_on_wasm"] }
env_logger = "0.11.10"
log = "0.4.29"
pretty_env_logger = "0.5.0"
env_filter = "1.0.1"
terminal_size = "0.4.4"
# ratatui-image = "11.0.2"


# [target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# crossterm = { version = "0.29.0", features = ["serde"] }

[lints]
workspace = true
